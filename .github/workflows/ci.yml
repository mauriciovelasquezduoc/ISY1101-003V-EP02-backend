name: Backend CI/CD — Test, Build, Push ECR, Deploy EC2

on:
  push:
    branches: ['**']   # cualquier push a cualquier rama

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: alumnos-backend

permissions:
  contents: write   # necesario para crear tags git

# ─────────────────────────────────────────────────────────────────────────────
# JOB 0: CODE QUALITY — OpenRewrite + Spotless + PMD
# Si falla aquí todo se detiene
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  code-quality:
    name: Code Quality (OpenRewrite + Spotless + PMD)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - name: OpenRewrite — dry-run
        run: ./gradlew rewriteDryRun -Dnet.bytebuddy.experimental=true

      - name: Spotless — verificar formato
        run: ./gradlew spotlessCheck

      - name: PMD — análisis estático
        run: ./gradlew pmdMain pmdTest

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: build/reports/pmd/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: BUILD & TEST — tests + cobertura ≥ 80%
# ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (cobertura ≥ 80%)
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - name: Compilar y ejecutar tests
        run: ./gradlew clean check jacocoTestReport -Dnet.bytebuddy.experimental=true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: |
            build/reports/jacoco/test/html/
            build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results/test/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: SECURITY — SonarCloud + Snyk
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - run: ./gradlew clean assemble -Dnet.bytebuddy.experimental=true

      - uses: actions/download-artifact@v4
        with:
          name: jacoco-coverage-report
          path: build/reports/jacoco/test/
        continue-on-error: true

      - name: SonarCloud
        run: |
          ./gradlew sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=false \
            -Dnet.bytebuddy.experimental=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Snyk CLI
        run: npm install -g snyk@latest

      - name: Snyk SCA
        run: |
          snyk test \
            --severity-threshold=high \
            --fail-on=all \
            --configuration-matching='^(compile|runtime|default)$'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk SARIF
        if: always()
        run: |
          snyk test \
            --severity-threshold=high \
            --configuration-matching='^(compile|runtime|default)$' \
            --sarif-file-output=snyk.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-security-report
          path: snyk.sarif
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: VERSIONING — calcula v1.x.0 y crea el tag git
# ─────────────────────────────────────────────────────────────────────────────
  versioning:
    name: Semantic Version (v1.x.0)
    runs-on: ubuntu-latest
    needs: security
    outputs:
      new_tag: ${{ steps.calc.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcular y crear tag
        id: calc
        run: |
          LAST=$(git tag --list 'v1.*' --sort=-v:refname | head -1)
          if [ -z "$LAST" ]; then
            NEW="v1.0.0"
          else
            MINOR=$(echo $LAST | cut -d. -f2)
            NEW="v1.$((MINOR + 1)).0"
          fi
          echo "Último: ${LAST:-ninguno} → Nuevo: $NEW"
          echo "new_tag=$NEW" >> $GITHUB_OUTPUT
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW
          git push origin $NEW

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4: BUILD & PUSH ECR
# Construye la imagen y la sube con tag versión + latest
# ─────────────────────────────────────────────────────────────────────────────
  build-push-ecr:
    name: Build & Push ECR (${{ needs.versioning.outputs.new_tag }})
    runs-on: ubuntu-latest
    needs: versioning

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - name: Generar jar de producción
        run: ./gradlew clean bootJar -x test -Dnet.bytebuddy.experimental=true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.new_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Resumen
        run: |
          echo "### Imagen publicada en ECR" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ needs.versioning.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** \`${{ steps.login-ecr.outputs.registry }}\`" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5: DEPLOY EN EC2-APP VIA SSM
# Lee el Instance ID desde /alumnos/ec2/app y ejecuta deploy-app.sh
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy EC2-App via SSM
    runs-on: ubuntu-latest
    needs: build-push-ecr

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Leer Instance ID de EC2-App desde Parameter Store
        id: get-instance
        run: |
          EC2_APP=$(aws ssm get-parameter \
            --name "/alumnos/ec2/app" \
            --query "Parameter.Value" \
            --output text)
          echo "instance_id=$EC2_APP" >> $GITHUB_OUTPUT
          echo "EC2-App: $EC2_APP"

      - name: Enviar deploy via SSM
        id: ssm-cmd
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo -u ec2-user /home/ec2-user/deploy-app.sh"]}' \
            --comment "Deploy backend ${{ needs.versioning.outputs.new_tag }}" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $CMD_ID"

      - name: Esperar resultado (máx 5 min)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
              --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Intento $i/30 — $STATUS"
            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardOutputContent" --output text
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          exit 1

      - name: Resumen del deploy
        if: success()
        run: |
          echo "### Deploy completado" >> $GITHUB_STEP_SUMMARY
          echo "- **Versión:** \`${{ needs.versioning.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **EC2-App:** \`${{ steps.get-instance.outputs.instance_id }}\`" >> $GITHUB_STEP_SUMMARY
