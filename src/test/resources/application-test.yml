spring:
  config:
    activate:
      on-profile: test

  # ── H2 en memoria para tests — no requiere PostgreSQL ────────────────────
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop   # crea el schema al iniciar y lo elimina al terminar
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  h2:
    console:
      enabled: false

cors:
  allowed-origins: "http://localhost:3000"
